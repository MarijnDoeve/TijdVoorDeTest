# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
# Development environment override
services:
  php:
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ~/.composer/cache:/root/.composer/cache
      - ./frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - ${CADDY_DATA_DIR:-./frankenphp/data}:/data
      - sass:/app/var/sass
      - typescript:/app/var/typescript
    environment:
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      MAILER_DSN: "smtp://mailer:1025"
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
    ports:
      # HTTP
      - target: 80
        published: ${HTTP_PORT:-8080}
        protocol: tcp
      # HTTPS
      - target: 443
        published: ${HTTPS_PORT:-8443}
        protocol: tcp
      # HTTP/3
      - target: 443
        published: ${HTTPS_PORT:-8443}
        protocol: udp
  sass:
    image: ${IMAGES_PREFIX:-}app-php
    volumes:
      - ./:/app:ro
      - sass:/app/var/sass
    entrypoint: ''
    depends_on:
      - php
    command:
      - bin/console
      - sass:build
      - --watch
      - -v
    healthcheck:
      disable: true

  typescript:
    image: ${IMAGES_PREFIX:-}app-php
    volumes:
      - ./:/app:ro
      - typescript:/app/var/typescript
    entrypoint: ''
    depends_on:
      - php
    command:
      - bin/console
      - typescript:build
      - --watch
      - -v
    healthcheck:
      disable: true

  ###> symfony/mercure-bundle ###
  ###< symfony/mercure-bundle ###
  
  ###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "${POSTGRES_PORT:-5430}:5432"
  ###< doctrine/doctrine-bundle ###
  
  ###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "${MAILPIT_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
  ###< symfony/mailer ###

  spotlight:
    image: ghcr.io/getsentry/spotlight:latest
    ports:
      - "${SPOTLIGHT_PORT:-8969}:8969"

volumes:
  sass:
  typescript:
